name: Ritual
options:
  bundleIdPrefix: com.ritual
  deploymentTarget:
    iOS: "26.0"
    macOS: "15.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    TARGETED_DEVICE_FAMILY: "1"
    INFOPLIST_KEY_UILaunchScreen_Generation: YES
    INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait
    INFOPLIST_KEY_UIStatusBarStyle: UIStatusBarStyleLightContent

packages:
  SQLite:
    url: https://github.com/stephencelis/SQLite.swift
    from: "0.15.0"

targets:
  Ritual:
    type: application
    platform: iOS
    sources:
      - path: Ritual
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ritual.app
        PRODUCT_MODULE_NAME: Ritual
        INFOPLIST_KEY_CFBundleDisplayName: Ritual
        INFOPLIST_KEY_NSCalendarsUsageDescription: "Ritual checks your calendar for events that may conflict with your daily intentions."
        INFOPLIST_KEY_NSCalendarsFullAccessUsageDescription: "Ritual checks your calendar for events that may conflict with your daily intentions."
        INFOPLIST_KEY_NSHealthShareUsageDescription: "Ritual reads your sleep data to show how rest affects your daily intention success."
        INFOPLIST_KEY_NSHealthUpdateUsageDescription: "Ritual does not write any health data."
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_STYLE: Automatic
        ENABLE_PREVIEWS: YES
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - package: SQLite
        product: SQLite
      - framework: HealthKit.framework
        embed: false

  RitualMac:
    type: application
    platform: macOS
    sources:
      - path: RitualMac
        excludes:
          - "**/.DS_Store"
      - path: Ritual/Models
        excludes:
          - "**/.DS_Store"
      - path: Ritual/Services
        excludes:
          - "**/.DS_Store"
          - "**/AmbientSoundPlayer.swift"
          - "**/HealthKitService.swift"
          - "**/BreathingService.swift"
      - path: Ritual/Theme
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ritual.app.mac
        PRODUCT_MODULE_NAME: RitualMac
        INFOPLIST_FILE: RitualMac/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_STYLE: Automatic
        ENABLE_PREVIEWS: YES
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks"
        COMBINE_HIDPI_IMAGES: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_KEY_NSMainNibFile: ""
        INFOPLIST_KEY_NSPrincipalClass: NSApplication
    dependencies:
      - package: SQLite
        product: SQLite

  RitualWatch:
    type: application
    platform: watchOS
    sources:
      - path: RitualWatch
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ritual.app.watchkitapp
        PRODUCT_MODULE_NAME: RitualWatch
        INFOPLIST_FILE: RitualWatch/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        WATCHOS_DEPLOYMENT_TARGET: "11.0"
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_STYLE: Automatic
        SKIP_INSTALL: YES

  RitualWidgets:
    type: app-extension
    platform: iOS
    sources:
      - path: RitualWidgets
        excludes:
          - "**/*.plist"
          - "**/.DS_Store"
    resources:
      - path: RitualWidgets/Resources
        excludes:
          - "**/*.plist"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ritual.app.widgets
        PRODUCT_MODULE_NAME: RitualWidgets
        INFOPLIST_FILE: RitualWidgets/Resources/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/Frameworks @executable_path/../../Frameworks"
        SKIP_INSTALL: YES
        CODE_SIGN_ENTITLEMENTS: ""
